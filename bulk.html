// ─── HELPERS ─────────────────────────────────────────────────────────────────
function normalizeMatric(m) { return m.replace(/\s+/g,'').toUpperCase(); }

function parseName(fullName) {
  const parts = fullName.trim().split(/\s+/);
  return {
    lastName:  parts[0] || '',
    firstName: parts[1] || '',
    otherName: parts.slice(2).join(' '),
  };
}

function buildDoc(s) {
  const matric = normalizeMatric(s.matric);
  const { lastName, firstName, otherName } = parseName(s.fullName);
  return {
    sn: s.sn,
    fullName: s.fullName.trim(),
    firstName, lastName, otherName,
    surname: lastName.toLowerCase(),
    matricNumber: matric,
    matricNormalized: matric.replace(/\//g,'').toLowerCase(),
    department: 'Computer Engineering',
    set: 'C28',
    level: '200',
    role: 'student',
    status: 'active',
    profileComplete: false,
    photoURL: '', email: '', hasPassword: false,
    passwordHash: '', phone: '', gender: '',
    state: '', bio: '', skills: [], interests: [],
    githubLink: '', linkedinLink: '', portfolioLink: '',
    lastLogin: null, createdAt: null, updatedAt: null,
  };
}

// ─── UI HELPERS ──────────────────────────────────────────────────────────────
const $bar    = () => document.getElementById('bar');
const $status = () => document.getElementById('status');
const $log    = () => document.getElementById('log');
const $pw     = () => document.getElementById('pw');
const $btn    = () => document.getElementById('btn');

function setBar(pct, state = '') {
  const b = $bar();
  b.style.width = pct + '%';
  b.className = 'bar-fill' + (state ? ' ' + state : '');
}

function addLog(msg, cls = 'l-inf') {
  const el = $log();
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

// ─── MAIN UPLOAD ─────────────────────────────────────────────────────────────
async function startUpload() {
  if (!window._db) { alert('Firebase not ready, wait a second and try again.'); return; }

  $btn().disabled = true;
  $pw().classList.add('show');
  $log().classList.add('show');
  $log().innerHTML = '';
  setBar(5);
  $status().textContent = 'Step 1/3 – Fetching existing records…';

  const { collection, getDocs, writeBatch, doc, serverTimestamp } = window._fns;
  const db = window._db;

  try {
    // ── STEP 1: Fetch ALL existing users in ONE query ──────────────────────
    const snap = await getDocs(collection(db, 'users'));
    const existingMatrics = new Set();
    snap.forEach(d => {
      const mn = d.data().matricNumber;
      if (mn) existingMatrics.add(mn);
    });

    addLog(`Found ${existingMatrics.size} existing record(s) in Firestore.`, 'l-inf');
    setBar(20);
    $status().textContent = 'Step 2/3 – Preparing batch…';

    // ── STEP 2: Decide what to upload ─────────────────────────────────────
    const toUpload = [];
    const skipped  = [];

    for (const s of STUDENTS) {
      const matric = normalizeMatric(s.matric);
      if (existingMatrics.has(matric)) {
        skipped.push(s);
      } else {
        toUpload.push(s);
      }
    }

    addLog(`To upload: ${toUpload.length} · To skip: ${skipped.length}`, 'l-inf');

    if (skipped.length) {
      skipped.forEach(s => addLog(`SKIP  ${s.fullName} (${normalizeMatric(s.matric)})`, 'l-skip'));
    }

    if (toUpload.length === 0) {
      setBar(100, 'done');
      $status().textContent = `All ${STUDENTS.length} students already exist — nothing to upload.`;
      addLog('Nothing new to upload.', 'l-skip');
      $btn().disabled = false;
      $btn().textContent = 'Re-run (all exist)';
      return;
    }

    // ── STEP 3: Batch write (max 500 per batch, we only have 85) ──────────
    setBar(40);
    $status().textContent = `Step 3/3 – Writing ${toUpload.length} students in batch…`;

    // Firestore writeBatch limit = 500 ops; split into chunks just in case
    const CHUNK = 499;
    let uploaded = 0;
    let failed   = 0;

    for (let i = 0; i < toUpload.length; i += CHUNK) {
      const chunk = toUpload.slice(i, i + CHUNK);
      const batch = writeBatch(db);

      chunk.forEach(s => {
        const matric = normalizeMatric(s.matric);
        const docId  = matric.replace(/\//g, '_');
        const data   = buildDoc(s);
        data.createdAt = serverTimestamp();
        data.updatedAt = serverTimestamp();
        batch.set(doc(db, 'users', docId), data);
      });

      try {
        await batch.commit();
        chunk.forEach(s => {
          uploaded++;
          addLog(`OK    ${s.fullName} (${normalizeMatric(s.matric)})`, 'l-ok');
        });
      } catch (batchErr) {
        // If a batch fails, try individual writes so we know which one broke
        for (const s of chunk) {
          const matric = normalizeMatric(s.matric);
          const docId  = matric.replace(/\//g, '_');
          const data   = buildDoc(s);
          data.createdAt = serverTimestamp();
          data.updatedAt = serverTimestamp();
          const singleBatch = writeBatch(db);
          singleBatch.set(doc(db, 'users', docId), data);
          try {
            await singleBatch.commit();
            uploaded++;
            addLog(`OK    ${s.fullName} (${matric})`, 'l-ok');
          } catch (e) {
            failed++;
            addLog(`ERR   ${s.fullName} (${matric}): ${e.message}`, 'l-err');
          }
        }
      }

      // Progress for multi-chunk (future-proof)
      setBar(40 + Math.round(((i + chunk.length) / toUpload.length) * 60));
    }

    // ── DONE ──────────────────────────────────────────────────────────────
    const hasErrors = failed > 0;
    setBar(100, hasErrors ? 'warn' : 'done');
    $status().textContent =
      `Done! ✅ ${uploaded} uploaded · ⚠️ ${skipped.length} skipped · ❌ ${failed} failed`;
    addLog(`─── COMPLETE: ${uploaded} uploaded, ${skipped.length} skipped, ${failed} failed ───`,
      hasErrors ? 'l-err' : 'l-ok');

    $btn().disabled = false;
    $btn().textContent = '🔁 Re-run (skips existing)';

  } catch (err) {
    setBar(100, 'warn');
    $status().textContent = 'Fatal error — see log.';
    addLog('FATAL: ' + err.message, 'l-err');
    $btn().disabled = false;
  }
}

window.startUpload = startUpload;
